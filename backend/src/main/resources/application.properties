# Nombre de la aplicación (ChanguitoStudios)
spring.application.name=Bosquejo-Backend

# Conexión a PostgreSQL (usando tus datos del .env)
spring.datasource.url=jdbc:postgresql://localhost:5432/BD_BOSQUEJO
spring.datasource.username=postgres
spring.datasource.password=luigipapu321
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA / Hibernate
# 'update' creará las tablas si no existen, pero no borrará tus datos actuales.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Puerto del servidor (Spring usa 8080 por defecto)
server.port=8080

spring.security.user.name=admin
spring.security.user.password=admin

